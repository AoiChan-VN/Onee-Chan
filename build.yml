name: в—ЎрҹҘҖрқ“җрқ“ёрқ“Ірқ“’рқ“ұрқ“Әрқ“·рҹҘҖв—ЎгҖҗрҹ‘»гҖ‘

# Bбәӯt/tбәҜt upload Artifact ( .jar )
env:
  ENABLE_ARTIFACT: false

on:
  push:
    branches: [ main ]
    #paths:
      #- "src/**"
      #- ".github/workflows/**"

  pull_request:
    #paths:
      #- "src/**"
      #- ".github/workflows/**"

jobs:
  build:
    name: в—ЎрҹҘҖрқ“җрқ“ёрқ“Ірқ“’рқ“ұрқ“Әрқ“·рҹҘҖв—Ў
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: рҹ”Һрқ“’рқ“ұрқ“®рқ“¬рқ“ҙ рқ“ўрқ“ёрқ“ҫрқ“»рқ“¬рқ“®
        uses: actions/checkout@v5

      # CГ i Д‘бә·t JavaScript
      - name: вҳ• пҪҠпҪҒпҪ–пҪҒ
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      # XГўy dб»ұng cбәҘu trГәc
      - name: вҡ’ рқ“‘рқ“ҫрқ“Ірқ“өрқ“ӯ рҹҸ—пёҸ
        run: mvn -B -ntp clean package
      
      # ДҗГіng gГіi file .jar
      - name: рҹ“Ұ рқ“Өрқ“№рқ“өрқ“ёрқ“Әрқ“»рқ“ӯ рқ“ірқ“Әрқ“»
        if: ${{ env.ENABLE_ARTIFACT == 'true' }}
        uses: actions/upload-artifact@v5
        with:
          name: AoiChan
          path: target/*.jar

      # Tб»ұ Д‘б»ҷng dб»Қn dбә№p Workflows Runs гҖҗ 5 Runs гҖ‘
      - name: рҹ—‘пёҸ рқ“’рқ“өрқ“®рқ“Әрқ“» рқ“Ұрқ“ёрқ“»рқ“ҙрқ“Ҝрқ“ёрқ”Җрқ“ј
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[5:] | .[].id' \
            | while read run; do
                echo "Д‘ГЈ xГіa вңӮ $run"
                gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tб»ұ Д‘б»ҷng dб»Қn dбә№p Cache гҖҗ 5 Cache гҖ‘
      - name: рҹ—‘пёҸ рқ“’рқ“өрқ“®рқ“Әрқ“» рқ“’рқ“Әрқ“¬рқ“ұрқ“®
        run: |
          gh cache list --limit 100 | awk '{print $1}' | tail -n +6 | while read key; do
            gh cache delete "$key"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
