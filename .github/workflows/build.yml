name: рҹҚҖрқ“җрқ“ёрқ’ҫрқ’һрқ’Ҫрқ’¶рқ“ғрҹ’Ӣ вһӘгҖҗCrystalрҹ’ҺгҖ‘

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/**"

  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/**"

jobs:
  build:
    name: гҖҗрҹ’Ӣрқ“җрқ“ёрқ“Ірқ“’рқ“ұрқ“Әрқ“·рҹ‘…гҖ‘
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: гҖҗрҹ”ҺKiб»ғm traгҖ‘
        uses: actions/checkout@v4

      # CГ i Д‘бә·t Actions Node.js
      - name: гҖҗрҹҹўрҹ…Ҫрҹ…ҫрҹ…ірҹ…ҙгҖ‘
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # CГ i Д‘бә·t JavaScript
      - name: гҖҗвҳ•рҹ…№рҹ…°рҹҶ…рҹ…°гҖ‘
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # XГўy dб»ұng cбәҘu trГәc
      - name: гҖҗрҹ“Ұрҹ…ұрҹҶ„рҹ…ёрҹ…»рҹ…ірҹҸ—пёҸгҖ‘
        run: mvn -B package -DskipTests

      # ДҗГіng gГіi thГ nh file .jar
      - name: гҖҗрҹ“Ұрҹ…№рҹ…°рҹҶҒгҖ‘
        uses: actions/upload-artifact@v4
        with:
          name: Crystal-Core
          path: target/*.jar
          retention-days: 1

      # Tб»ұ Д‘б»ҷng dб»Қn dбә№p Workflows Runs
      - name: гҖҗрҹ—‘пёҸDб»Қn Dбә№pгҖ‘
        if: success()
        run: |
          echo "Dб»Қn dбә№p Workflows Runs..."

          runs=$(gh api repos/${{ github.repository }}/actions/runs \
          --paginate --jq '.workflow_runs[].id')

          count=0
          for run in $runs; do
            count=$((count+1))
            if [ $count -gt 5 ]; then
              echo "Deleting run $run"
              gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
