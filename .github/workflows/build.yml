name: 👅【🌱AoiEngine🍀】

# Bật/tắt upload Artifact ( .jar )
env:
  ENABLE_ARTIFACT: false

on:
  push:
    branches: [ main ]
    #paths:
      #- "src/**"
      #- ".github/workflows/**"

  pull_request:
    #paths:
      #- "src/**"
      #- ".github/workflows/**"

jobs:
  build:
    name: ༺◡🥀𝓐𝓸𝓲𝓒𝓱𝓪𝓷🥀◡༻
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: 🔎𝓒𝓱𝓮𝓬𝓴 𝓢𝓸𝓾𝓻𝓬𝓮
        uses: actions/checkout@v4

      # Cài đặt Actions Node.js
      - name: 📒 𝓝𝓸𝓭𝓮
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Cài đặt JavaScript
      - name: ☕ ｊａｖａ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      # Xây dựng cấu trúc
      - name: ⚒ 𝓑𝓾𝓲𝓵𝓭 🏗️
        run: mvn -B -ntp package
      
      # Đóng gói file .jar
      - name: 📦 𝓤𝓹𝓵𝓸𝓪𝓻𝓭 𝓳𝓪𝓻
        if: ${{ env.ENABLE_ARTIFACT == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: AoiEngine
          path: target/*.jar
          retention-days: 1

      # Tự động dọn dẹp Workflows Runs 【 5 Runs 】
      - name: 🗑️ 𝓒𝓵𝓮𝓪𝓻 𝓦𝓸𝓻𝓴𝓯𝓸𝔀𝓼
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[5:] | .[].id' \
            | while read run; do
                echo "đã xóa ✂ $run"
                gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tự động dọn dẹp Cache 【 5 Cache 】
      - name: 🗑️ 𝓒𝓵𝓮𝓪𝓻 𝓒𝓪𝓬𝓱𝓮
        run: |
          gh cache list --limit 100 | awk '{print $1}' | tail -n +6 | while read key; do
            gh cache delete "$key"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
