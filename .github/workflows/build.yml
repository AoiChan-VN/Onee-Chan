name: 🍀𝓐𝓸𝒾𝒞𝒽𝒶𝓃 ➪【Build】

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/**"
      
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Build project
        run: mvn -B package -DskipTests

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with: 
          name: Crystal-Core
          path: target/*.jar
          retention-days: 1
