name: рҹҚҖрқ“җрқ“ёрқ’ҫрқ’һрқ’Ҫрқ’¶рқ“ғрҹ’Ӣ вһӘгҖҗCrystalрҹ’ҺгҖ‘

on:
  push:
    branches: [ main ]
    #paths:
      #- "src/**"
      #- ".github/workflows/**"

  pull_request:
    #paths:
      #- "src/**"
      #- ".github/workflows/**"

jobs:
  build:
    name: рҹ’Ӣрқ“җрқ“ёрқ“Ірқ“’рқ“ұрқ“Әрқ“·рҹ‘…
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: рҹ”ҺKiб»ғm tra
        uses: actions/checkout@v4

      # CГ i Д‘бә·t Actions Node.js
      - name: рҹҹўрҹ…Ҫрҹ…ҫрҹ…ірҹ…ҙ
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # CГ i Д‘бә·t JavaScript
      - name: вҳ•рҹ…№рҹ…°рҹҶ…рҹ…°
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # XГўy dб»ұng cбәҘu trГәc
      - name: рҹ“Ұрҹ…ұрҹҶ„рҹ…ёрҹ…»рҹ…ірҹҸ—пёҸ
        run: mvn -B package -DskipTests
      
      # ДҗГіng gГіi thГ nh file .jar
      - name: рҹ“Ұрҹ…№рҹ…°рҹҶҒ
        uses: actions/upload-artifact@v4
        with:
          name: crystal-core
          path: target/*.jar
          retention-days: 1

      # Tб»ұ Д‘б»ҷng dб»Қn dбә№p Workflows Runs
      - name: рҹ—‘пёҸDб»Қn Dбә№p
        if: success()
        run: |
          echo "Дҗang dб»Қn Workflows..."

          runs=$(gh api repos/${{ github.repository }}/actions/runs \
          --paginate --jq '.workflow_runs[].id')

          count=0
          for run in $runs; do
            count=$((count+1))
            if [ $count -gt 5 ]; then
              echo "ДҗГЈ xГіa вңӮ $run"
              gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
