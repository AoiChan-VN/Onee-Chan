name: Build Gems Ultimate

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          
          name: Gems-Ultimate
          path: target/*.jar
           
      - name: Build with Maven
        run: mvn clean package --no-transfer-progress
