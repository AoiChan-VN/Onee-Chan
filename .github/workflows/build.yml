name: рҹҚҖрқ“җрқ“ёрқ’ҫрқ’һрқ’Ҫрқ’¶рқ“ғрҹ’Ӣ вһӘгҖҗCrystalрҹ’ҺгҖ‘

on:
  push:
    branches: [ main ]
    #paths:
      #- "src/**"
      #- ".github/workflows/**"

  pull_request:
    #paths:
      #- "src/**"
      #- ".github/workflows/**"

jobs:
  build:
    name: рҹҺҗрқ“җрқ“ёрқ“Ірқ“’рқ“ұрқ“Әрқ“·рҹҺҗ
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - name: рҹ”Һрқ“’рқ“ұрқ“®рқ“¬рқ“ҙ рқ“ўрқ“ёрқ“ҫрқ“»рқ“¬рқ“®
        uses: actions/checkout@v4

      # CГ i Д‘бә·t Actions Node.js
      - name: рҹ“’ рқ“қрқ“ёрқ“ӯрқ“®
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # CГ i Д‘бә·t JavaScript
      - name: вҳ• пҪҠпҪҒпҪ–пҪҒ
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # XГўy dб»ұng cбәҘu trГәc
      - name: вҡ’ рқ“‘рқ“ҫрқ“Ірқ“өрқ“ӯ рҹҸ—пёҸ
        run: mvn -B package -DskipTests
      
      # ДҗГіng gГіi thГ nh file .jar
      - name: рҹ“Ұ рқ“Өрқ“№рқ“өрқ“ёрқ“Әрқ“»рқ“ӯ рқ“ірқ“Әрқ“»
        uses: actions/upload-artifact@v4
        with:
          name: crystal-core
          path: target/*.jar
          retention-days: 1

      # Tб»ұ Д‘б»ҷng dб»Қn dбә№p Workflows Runs
      - name: рҹ—‘пёҸ рқ“’рқ“өрқ“®рқ“Әрқ“» рқ“Ұрқ“ёрқ“»рқ“ҙрқ“Ҝрқ“ёрқ”Җрқ“ј
        if: success()
        run: |
          echo "Дҗang dб»Қn Workflows..."

          runs=$(gh api repos/${{ github.repository }}/actions/runs \
          --paginate --jq '.workflow_runs[].id')

          count=0
          for run in $runs; do
            count=$((count+1))
            if [ $count -gt 5 ]; then
              echo "ДҗГЈ xГіa вңӮ $run"
              gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
