name: в—ЎрҹҘҖрқ“җрқ“ёрқ“Ірқ“’рқ“ұрқ“Әрқ“·рҹҘҖв—ЎгҖҗрҹ‘»гҖ‘

# Bбәӯt/tбәҜt upload Artifact ( .jar )
env:
  ENABLE_ARTIFACT: false

on:
  push:
    branches: [ main ]
    #paths:
      #- "src/**"
      #- ".github/workflows/**"

  #pull_request:
    #paths:
      #- "src/**"
      #- ".github/workflows/**"
      
    #workflow_dispatch:

permissions:
  actions: write
  contents: read
  
jobs:
  build:
    name: в—ЎрҹҘҖрқ“җрқ“ёрқ“Ірқ“’рқ“ұрқ“Әрқ“·рҹҘҖв—Ў
    runs-on: ubuntu-latest
    
    steps:
      - name: рҹ”Һрқ“’рқ“ұрқ“®рқ“¬рқ“ҙ рқ“ўрқ“ёрқ“ҫрқ“»рқ“¬рқ“®
        uses: actions/checkout@v6

      # CГ i Д‘бә·t JavaScript
      - name: вҳ• пҪҠпҪҒпҪ–пҪҒпјіcпҪ’рқҡ’пҪҗрқҡқ
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      # XГўy dб»ұng cбәҘu trГәc
      - name: вҡ’ рқ“‘рқ“ҫрқ“Ірқ“өрқ“ӯ рҹҸ—пёҸ
        run: mvn -B -ntp clean package -DskipTests

      #- name: рҹӣЎпёҸ Security Check
        #run: |
          #mvn org.owasp:dependency-check-maven:check \
            #-DnvdApiKey=${{ secrets.NVD_API_KEY }}
        #env:
          #GH_TOKEN: ${{ secrets.AOI_ACTIONS }}

      # ДҗГіng gГіi file .jar
      - name: рҹ“Ұ рқ“Өрқ“№рқ“өрқ“ёрқ“Әрқ“»рқ“ӯ рқ“ірқ“Әрқ“»
        if: ${{ env.ENABLE_ARTIFACT == 'true' }}
        uses: actions/upload-artifact@v5
        with:
          name: AoiChan
          path: target/*.jar

      # Tб»ұ Д‘б»ҷng dб»Қn dбә№p Workflows Runs гҖҗ 5 Runs гҖ‘
      - name: вҷ»пёҸрқҗҺрқҗӢрқҗғ рқҗ–рқҗҺрқҗ‘рқҗҠрқҗ…рқҗӢрқҗҺрқҗ–рқҗ’
        run: |
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[5:] | map(select(.status=="completed")) | .[].id' \
            | while read run; do
                echo "рҹ—‘пёҸ Д‘ГЈ xГіa $run"
                gh api repos/${{ github.repository }}/actions/runs/$run -X DELETE
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_ACTIONS }}

      - name: вҷ»пёҸрқҗҺрқҗӢрқҗғ рқҗӮрқҗҖрқҗӮрқҗҮрқҗ„
        run: |
          gh cache list --json id,createdAt \
            | jq 'sort_by(.createdAt) | reverse | .[5:] | .[].id' \
            | while read id; do
                echo "рҹ—‘пёҸ Д‘ГЈ xГіa $id"
                gh cache delete "$id"
              done
        env:
          GH_TOKEN: ${{ secrets.AOI_ACTIONS }}
