name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: "✨ Features"
    labels:
      - "feature"

  - title: "🐛 Bug Fixes"
    labels:
      - "bug"

  - title: "⚡ Improvements"
    labels:
      - "enhancement"

change-template: "- $TITLE (#$NUMBER)"

template: |
  ## Changes
  $CHANGES 
