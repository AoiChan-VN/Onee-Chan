name: CrystalUltimate
version: 2.1.0
main: aoichan.crystal.AoiMain
api-version: 1.20
author: AoiChan

commands:
  gems:
    description: Main command
    usage: /gems
    permission: gems.admin

permissions:
  gems.admin:
    default: op

  gems.reload:
    default: op

  gems.give:
    default: op

  gems.take:
    default: op

  gems.set:
    default: op

  gems.balance:
    default: true

  gems.list:
    default: true
